name: "[Fallback] Build & deploy to cPanel via FTP"

# ⚠️ Deployment utama sekarang: Hostinger Git deployment (build di sisi
# Hostinger, auto-deploy tiap push ke master — dikonfigurasi di hPanel, bukan
# di repo ini). Workflow ini disimpan HANYA sebagai fallback manual: jalankan
# lewat tombol "Run workflow" di tab Actions bila jalur Hostinger bermasalah.
# Setelah jalur Hostinger terbukti stabil, file ini + secrets FTP_* boleh
# dihapus sepenuhnya.

on:
  workflow_dispatch: {} # manual saja — tidak lagi terpicu oleh push

permissions:
  contents: read

concurrency:
  group: deploy-blog
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (npm run build -> dist/)
        run: npm run build

      - name: Deploy dist/ to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps # FTP over TLS. Kalau host tidak dukung, ganti ke: ftp
          port: 21
          local-dir: ./dist/ # WAJIB diakhiri "/"
          server-dir: ${{ secrets.FTP_SERVER_DIR }} # docroot subdomain, akhiri "/"
          # Action ini sinkron incremental (simpan state di server),
          # jadi push berikutnya hanya meng-upload file yang berubah.
