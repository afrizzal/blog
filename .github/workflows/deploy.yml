name: Build & deploy to cPanel

on:
  push:
    branches: [master]
  workflow_dispatch: {} # tombol "Run workflow" manual di tab Actions

permissions:
  contents: read

# Jangan jalankan dua deploy bersamaan; batalkan yang lama bila ada push baru.
concurrency:
  group: deploy-blog
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (npm run build -> dist/)
        run: npm run build

      - name: Deploy dist/ to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps # FTP over TLS. Kalau host tidak dukung, ganti ke: ftp
          port: 21
          local-dir: ./dist/ # WAJIB diakhiri "/"
          server-dir: ${{ secrets.FTP_SERVER_DIR }} # docroot subdomain, akhiri "/"
          # Action ini sinkron incremental (simpan state di server),
          # jadi push berikutnya hanya meng-upload file yang berubah.
